name: daily-report

on:
  schedule:
    # 매일 07:30 KST (22:30 UTC)
    - cron: "30 22 * * *"
  workflow_dispatch: # Actions 탭에서 수동 실행 가능

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # 버전은 package.json packageManager 필드 사용

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # provider 캐시 유지 (인스타 7일 예산·유튜브 쿼터 추적, 지표 24h TTL)
      - uses: actions/cache@v4
        with:
          path: .cache
          key: provider-cache-${{ github.run_id }}
          restore-keys: provider-cache-

      - run: pnpm install --frozen-lockfile

      - run: pnpm report
        env:
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
